<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Members & Calendar Management</title>
<style>
body { font-family: Arial; margin:0; padding:40px; background:#002147; color:#fff; }
h1,h2,h3,h4{color:#FFD700;}
.container{max-width:1100px;margin:auto;background:#1a1a1a;padding:30px;border-radius:12px;}
input,select{width:100%;padding:8px;margin:6px 0;}
.btn{background:#FFD700;color:#000;border:none;padding:8px 14px;border-radius:6px;cursor:pointer;font-weight:bold;margin:4px 2px;}
.btn-danger{background:#800000;color:#fff;}
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px;margin-top:20px;}
.member-card{background:#262626;padding:15px;border-radius:10px;text-align:center;}
.member-card img{width:100%;height:220px;object-fit:cover;border-radius:8px;}
</style>
</head>
<body>
<div class="container">

<h1>Members & Calendar Management</h1>

<!-- LOGIN -->
<div id="loginStage">
  <h2>Login</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button class="btn" onclick="login()">Login</button>
</div>

<!-- MAIN MEMBERS & ADMIN AREA -->
<div id="membersStage" style="display:none;">
  <button class="btn" onclick="logout()">Logout</button>

  <!-- ADMIN CONTROLS -->
  <div id="adminControls" style="display:none;">
    <h3>Add / Edit Member</h3>
    <input id="mName" placeholder="Name">
    <input id="mSurname" placeholder="Surname">
    <input id="mNumber" placeholder="Member Number">
    <input id="mTitle" placeholder="Title">
    <input id="mPhoto" type="file" accept="image/*">

    <h4>Visibility</h4>
    <label><input type="checkbox" id="vName" checked> Show Name</label><br>
    <label><input type="checkbox" id="vSurname" checked> Show Surname</label><br>
    <label><input type="checkbox" id="vTitle" checked> Show Title</label><br>
    <label><input type="checkbox" id="vNumber" checked> Show Number</label><br>
    <label><input type="checkbox" id="vPhoto" checked> Show Photo</label><br>

    <button class="btn" onclick="saveMember()">Save Member</button>
    <hr>

    <h3>User Management</h3>
    <input id="newUsername" placeholder="Username">
    <input id="newPassword" placeholder="Password">
    <select id="newRole">
      <option value="member">Member</option>
      <option value="admin">Admin</option>
      <option value="pastor">Pastor/Events Coordinator</option>
    </select>
    <button class="btn" onclick="addUser()">Add User</button>

    <div id="userList"></div>
    <hr>

    <h3>Event Requests</h3>
    <div id="eventRequests"></div>
  </div>

  <!-- MEMBER GRID -->
  <div class="member-grid" id="memberGrid"></div>
</div>

<script>
/* STORAGE */
function getUsers(){ return JSON.parse(localStorage.getItem("users")||"{}"); }
function saveUsers(u){ localStorage.setItem("users",JSON.stringify(u)); }
function getMembers(){ return JSON.parse(localStorage.getItem("members")||"[]"); }
function saveMembers(m){ localStorage.setItem("members",JSON.stringify(m)); }
function getEvents(){ return JSON.parse(localStorage.getItem("events")||"[]"); }
function saveEvents(e){ localStorage.setItem("events",JSON.stringify(e)); }

/* INIT ADMINS */
if(!localStorage.getItem("users")){
  saveUsers({
    admin1:{password:"admin123",role:"admin",active:true,immutable:true},
    admin2:{password:"admin456",role:"admin",active:true}
  });
}

let role=null;
let editingMemberId=null;

/* AUTH */
function login(){
  const users = getUsers();
  const uname = document.getElementById("username").value;
  const pwd = document.getElementById("password").value;
  const user = users[uname];

  if(user && user.password === pwd && user.active){
    role = user.role;
    document.getElementById("loginStage").style.display = "none";
    document.getElementById("membersStage").style.display = "block";
    document.getElementById("adminControls").style.display = (role === "admin") ? "block" : "none";
    if(role === "admin"){ loadUsers(); loadEvents(); }
    loadMembers();
  } else { alert("Invalid username, password, or disabled account"); }
}

function logout(){
  role = null;
  document.getElementById("membersStage").style.display = "none";
  document.getElementById("loginStage").style.display = "block";
}

/* USER MANAGEMENT */
function addUser(){
  const users=getUsers();
  const uname=document.getElementById("newUsername").value.trim();
  const pwd=document.getElementById("newPassword").value.trim();
  const r=document.getElementById("newRole").value;
  if(!uname || !pwd){ alert("Required"); return; }
  if(users[uname]){ alert("Username exists"); return; }
  users[uname]={password:pwd,role:r,active:true};
  saveUsers(users);
  document.getElementById("newUsername").value=""; 
  document.getElementById("newPassword").value="";
  document.getElementById("newRole").value="member";
  loadUsers();
}

function editUser(username){
  if(username==="admin1"){ alert("Cannot edit this user"); return; }
  const users=getUsers();
  const newName=prompt("New Username:",username);
  if(!newName) return;
  const newRoleValue=prompt("Role (admin/member/pastor):",users[username].role);
  if(!newRoleValue) return;
  const userData=users[username];
  delete users[username];
  users[newName]={password:userData.password,role:newRoleValue,active:userData.active};
  saveUsers(users);
  loadUsers();
}

function resetPassword(username){
  if(username==="admin1"){ alert("Cannot reset password for this user"); return; }
  const newPass=prompt("Enter new password:");
  if(!newPass) return;
  const users=getUsers();
  users[username].password=newPass;
  saveUsers(users);
}

function toggleUser(username){
  if(username==="admin1"){ alert("Cannot disable this user"); return; }
  const users=getUsers();
  users[username].active=!users[username].active;
  saveUsers(users);
  loadUsers();
}

function deleteUser(username){
  if(username==="admin1"){ alert("Cannot delete this user"); return; }
  if(!confirm("Delete user permanently?")) return;
  const users=getUsers();
  delete users[username];
  saveUsers(users);
  loadUsers();
}

function loadUsers(){
  const users=getUsers();
  let html="<h4>Existing Users</h4>";
  Object.keys(users).forEach(u=>{
    html+=`
      <div>
        <strong>${u}</strong> (${users[u].role}) - ${users[u].active?"Active":"Disabled"}
        <button class="btn" onclick="editUser('${u}')">Edit</button>
        <button class="btn" onclick="resetPassword('${u}')">Reset</button>
        <button class="btn btn-danger" onclick="toggleUser('${u}')">${users[u].active?"Disable":"Enable"}</button>
        <button class="btn btn-danger" onclick="deleteUser('${u}')">Delete</button>
      </div>
    `;
  });
  document.getElementById("userList").innerHTML=html;
}

/* MEMBER MANAGEMENT */
function saveMember(){
  const members=getMembers();
  const mName=document.getElementById("mName").value.trim();
  const mSurname=document.getElementById("mSurname").value.trim();
  const mNumber=document.getElementById("mNumber").value.trim();
  const mTitle=document.getElementById("mTitle").value.trim();
  const vName=document.getElementById("vName").checked;
  const vSurname=document.getElementById("vSurname").checked;
  const vTitle=document.getElementById("vTitle").checked;
  const vNumber=document.getElementById("vNumber").checked;
  const vPhoto=document.getElementById("vPhoto").checked;
  const mPhoto=document.getElementById("mPhoto").files[0];

  const memberData={
    id:editingMemberId||Date.now(),
    name:mName,
    surname:mSurname,
    number:mNumber,
    title:mTitle,
    visibility:{name:vName,surname:vSurname,title:vTitle,number:vNumber,photo:vPhoto}
  };

  if(mPhoto){
    const reader=new FileReader();
    reader.onload=function(){
      memberData.photo=reader.result;
      commitMember(memberData);
    };
    reader.readAsDataURL(mPhoto);
  } else {
    const existing=members.find(m=>m.id===editingMemberId);
    memberData.photo=existing?existing.photo:"";
    commitMember(memberData);
  }
}

function commitMember(memberData){
  let members=getMembers();
  if(editingMemberId){ members=members.map(m=>m.id===editingMemberId?memberData:m); }
  else { members.push(memberData); }
  saveMembers(members);
  editingMemberId=null;
  clearForm();
  loadMembers();
}

function editMember(id){
  const members=getMembers();
  const m=members.find(x=>x.id===id);
  editingMemberId=id;
  document.getElementById("mName").value=m.name;
  document.getElementById("mSurname").value=m.surname;
  document.getElementById("mNumber").value=m.number;
  document.getElementById("mTitle").value=m.title;
  document.getElementById("vName").checked=m.visibility.name;
  document.getElementById("vSurname").checked=m.visibility.surname;
  document.getElementById("vTitle").checked=m.visibility.title;
  document.getElementById("vNumber").checked=m.visibility.number;
  document.getElementById("vPhoto").checked=m.visibility.photo;
}

function deleteMember(id){
  if(!confirm("Delete member?")) return;
  const members=getMembers().filter(m=>m.id!==id);
  saveMembers(members);
  loadMembers();
}

function clearForm(){
  document.getElementById("mName").value="";
  document.getElementById("mSurname").value="";
  document.getElementById("mNumber").value="";
  document.getElementById("mTitle").value="";
  document.getElementById("mPhoto").value="";
  document.getElementById("vName").checked=true;
  document.getElementById("vSurname").checked=true;
  document.getElementById("vTitle").checked=true;
  document.getElementById("vNumber").checked=true;
  document.getElementById("vPhoto").checked=true;
}

function loadMembers(){
  const memberGrid=document.getElementById("memberGrid");
  memberGrid.innerHTML="";
  getMembers().forEach(m=>{
    const show=role==="admin"?{name:true,surname:true,title:true,number:true,photo:true}:m.visibility;
    let content="";
    if(show.photo && m.photo) content+=`<img src="${m.photo}">`;
    if(show.name||show.surname) content+=`<h4>${show.name?m.name:""} ${show.surname?m.surname:""}</h4>`;
    if(show.title) content+=`<p>${show.title}</p>`;
    if(show.number) content+=`<small>${show.number}</small>`;
    memberGrid.innerHTML+=`<div class="member-card">${content}${role==="admin"?`<button class="btn" onclick="editMember(${m.id})">Edit</button><button class="btn btn-danger" onclick="deleteMember(${m.id})">Delete</button>`:""}</div>`;
  });
}

/* EVENT REQUESTS */
function submitEventRequest(title,date,desc){
  const events=getEvents();
  events.push({id:Date.now(),title,date,description:desc,status:"pending"});
  saveEvents(events);
  if(role==="admin") loadEvents();
}

function loadEvents(){
  const events=getEvents();
  let html="<h4>Pending Event Requests</h4>";
  events.filter(e=>e.status==="pending").forEach(ev=>{
    html+=`<div>
      <strong>${ev.title}</strong> on ${ev.date} - ${ev.description}<br>
      <button class="btn" onclick="approveEvent(${ev.id})">Approve</button>
      <button class="btn btn-danger" onclick="rejectEvent(${ev.id})">Reject</button>
    </div>`;
  });
  document.getElementById("eventRequests").innerHTML=html;
}

function approveEvent(id){
  const events=getEvents();
  events.forEach(e=>{if(e.id===id)e.status="approved";});
  saveEvents(events);
  loadEvents();
}

function rejectEvent(id){
  const events=getEvents();
  events.forEach(e=>{if(e.id===id)e.status="rejected";});
  saveEvents(events);
  loadEvents();
}
</script>
</body>
</html>
