<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Members Area</title>

<style>
body{font-family:Arial;background:#002147;color:#fff;padding:40px;}
.container{max-width:1100px;margin:auto;background:#1a1a1a;padding:30px;border-radius:12px;}
input,select{width:100%;padding:8px;margin:6px 0;}
.btn{background:#FFD700;color:#000;padding:8px 14px;border:none;border-radius:6px;font-weight:bold;cursor:pointer;margin:4px;}
.btn-danger{background:#800000;color:#fff;}
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px;margin-top:20px;}
.member-card{background:#262626;padding:15px;border-radius:10px;text-align:center;}
.member-card img{width:100%;height:220px;object-fit:cover;border-radius:8px;}
.hidden{display:none;}
</style>
</head>

<body>
<div class="container">

<h1>Members Area</h1>

<div id="loginBox">
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button class="btn" onclick="login()">Login</button>
</div>

<div id="panel" class="hidden">

<button class="btn" onclick="logout()">Logout</button>

<div id="adminPanel" class="hidden">

<h3>Member Management</h3>
<input id="mName" placeholder="Name">
<input id="mSurname" placeholder="Surname">
<input id="mNumber" placeholder="Member Number">
<input id="mTitle" placeholder="Title">
<input id="mPhoto" type="file">
<button class="btn" onclick="saveMember()">Save Member</button>

<hr>

<h3>User Management</h3>
<input id="uName" placeholder="Username">
<input id="uPass" placeholder="Password">
<select id="uRole">
<option value="member">Member</option>
<option value="admin">Admin</option>
<option value="pastor">Pastor</option>
</select>
<button class="btn" onclick="saveUser()">Create User</button>

<div id="userList"></div>

<hr>

<h3>Pending Events</h3>
<div id="pendingEvents"></div>

</div>

<div class="member-grid" id="membersGrid"></div>

</div>
</div>

<script>

/* STORAGE */
function getUsers(){return JSON.parse(localStorage.getItem("users")||"{}");}
function saveUsers(u){localStorage.setItem("users",JSON.stringify(u));}
function getMembers(){return JSON.parse(localStorage.getItem("members")||"[]");}
function saveMembers(m){localStorage.setItem("members",JSON.stringify(m));}
function getEvents(){return JSON.parse(localStorage.getItem("events")||"[]");}
function saveEvents(e){localStorage.setItem("events",JSON.stringify(e));}

/* FORCE SUPERADMIN */
let users=getUsers();

users.superadmin={
password:"super123",
role:"superadmin",
active:true
};

if(!users.admin2){
users.admin2={password:"admin456",role:"admin",active:true};
}

saveUsers(users);

let currentUser=null;
let editMemberId=null;

/* LOGIN */
function login(){
let users=getUsers();
let u=username.value.trim();
let p=password.value.trim();

if(users[u] && users[u].password===p && users[u].active){

currentUser={username:u,role:users[u].role};

loginBox.classList.add("hidden");
panel.classList.remove("hidden");

if(currentUser.role==="admin" || currentUser.role==="superadmin"){
adminPanel.classList.remove("hidden");
loadUsers();
loadPending();
}

loadMembers();

}else{
alert("Invalid credentials");
}
}

function logout(){
location.reload();
}

/* ADMIN CHECK */
function isAdmin(){
return currentUser && 
(currentUser.role==="admin" || currentUser.role==="superadmin");
}

/* USER MANAGEMENT */
function saveUser(){
if(!isAdmin()) return;
let users=getUsers();
users[uName.value]={
password:uPass.value,
role:uRole.value,
active:true
};
saveUsers(users);
loadUsers();
}

function loadUsers(){
if(!isAdmin()) return;

let users=getUsers();
let html="";
Object.keys(users).forEach(u=>{

html+=`
<div>
${u} (${users[u].role})
<button class="btn" onclick="resetPass('${u}')">Reset</button>
${u!=="superadmin" ? `<button class="btn btn-danger" onclick="deleteUser('${u}')">Delete</button>`:""}
</div>`;
});
userList.innerHTML=html;
}

function resetPass(u){
if(!isAdmin()) return;
let users=getUsers();
users[u].password=prompt("New Password:");
saveUsers(users);
loadUsers();
}

function deleteUser(u){
if(!isAdmin()) return;
if(u==="superadmin") return;
let users=getUsers();
delete users[u];
saveUsers(users);
loadUsers();
}

/* MEMBERS */
function saveMember(){
if(!isAdmin()) return;

let members=getMembers();
let data={
id:editMemberId||Date.now(),
name:mName.value,
surname:mSurname.value,
number:mNumber.value,
title:mTitle.value
};

members.push(data);
saveMembers(members);
loadMembers();
}

function loadMembers(){
membersGrid.innerHTML="";
getMembers().forEach(m=>{
membersGrid.innerHTML+=`
<div class="member-card">
<h4>${m.name} ${m.surname}</h4>
<p>${m.title||""}</p>
<small>${m.number||""}</small>
${isAdmin()?`
<button class="btn btn-danger" onclick="deleteMember(${m.id})">Delete</button>
`:""}
</div>`;
});
}

function deleteMember(id){
if(!isAdmin()) return;
saveMembers(getMembers().filter(m=>m.id!==id));
loadMembers();
}

/* EVENTS APPROVAL */
function loadPending(){
if(!isAdmin()) return;

let html="";
getEvents().filter(e=>e.status==="pending").forEach(e=>{
html+=`
<div>
${e.title}
<button class="btn" onclick="approve(${e.id})">Approve</button>
<button class="btn btn-danger" onclick="reject(${e.id})">Reject</button>
</div>`;
});
pendingEvents.innerHTML=html;
}

function approve(id){
if(!isAdmin()) return;
let events=getEvents();
events.find(e=>e.id===id).status="approved";
saveEvents(events);
loadPending();
}

function reject(id){
if(!isAdmin()) return;
saveEvents(getEvents().filter(e=>e.id!==id));
loadPending();
}

</script>
</body>
</html>
