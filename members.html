<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Member Hub</title>

<style>
body{
    font-family: Arial;
    margin:0;
    background:#002147;
    color:white;
}

header{
    background:#00152d;
    padding:15px;
    text-align:center;
    font-size:22px;
}

.container{
    padding:20px;
}

button{
    padding:8px 12px;
    margin:5px 0;
    border:none;
    cursor:pointer;
    background:#0056b3;
    color:white;
}

input, select{
    padding:8px;
    margin:5px 0;
    width:100%;
}

.hidden{
    display:none;
}

.card{
    background:#001a33;
    padding:15px;
    margin:10px 0;
}

.nav button{
    margin-right:10px;
}
</style>
</head>
<body>

<header>Member Hub</header>

<div class="container">

<!-- LOGIN -->
<div id="loginSection">
    <h3>Login</h3>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- MAIN APP -->
<div id="appSection" class="hidden">

    <div class="nav">
        <button onclick="showSection('calendar')">Calendar</button>
        <button onclick="showSection('members')">Members</button>
        <button id="adminBtn" onclick="showSection('admin')">Admin</button>
        <button onclick="showSection('profile')">Profile</button>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- CALENDAR -->
    <div id="calendar" class="section">
        <h3>Events</h3>
        <div id="eventList"></div>
    </div>

    <!-- MEMBERS -->
    <div id="members" class="section hidden">
        <h3>Members</h3>
        <div id="memberList"></div>
    </div>

    <!-- ADMIN -->
    <div id="admin" class="section hidden">
        <h3>Admin Panel</h3>

        <div id="adminControls"></div>

    </div>

    <!-- PROFILE -->
    <div id="profile" class="section hidden">
        <h3>User Profile</h3>
        <div id="profileInfo"></div>
    </div>

</div>
</div>

<script>

let currentUser = null;

if(!localStorage.getItem("users")){
    const defaultUsers = [
        {username:"superadmin", password:"1234", role:"superadmin"},
        {username:"admin", password:"1234", role:"admin"},
        {username:"pastor", password:"1234", role:"pastor"},
        {username:"member", password:"1234", role:"member"}
    ];
    localStorage.setItem("users", JSON.stringify(defaultUsers));
}

if(!localStorage.getItem("members")){
    localStorage.setItem("members", JSON.stringify([
        {name:"John Smith"},
        {name:"Mary Jones"}
    ]));
}

if(!localStorage.getItem("events")){
    localStorage.setItem("events", JSON.stringify([
        {title:"Sunday Service"},
        {title:"Prayer Meeting"}
    ]));
}

function login(){
    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    const users = JSON.parse(localStorage.getItem("users"));

    const user = users.find(u => u.username === username && u.password === password);

    if(user){
        currentUser = user;
        document.getElementById("loginSection").classList.add("hidden");
        document.getElementById("appSection").classList.remove("hidden");
        setupPermissions();
        loadData();
    } else {
        alert("Invalid login");
    }
}

function logout(){
    location.reload();
}

function setupPermissions(){

    const adminBtn = document.getElementById("adminBtn");

    if(currentUser.role === "superadmin" || currentUser.role === "admin"){
        adminBtn.classList.remove("hidden");
    } else {
        adminBtn.classList.add("hidden");
    }

    if(currentUser.role === "member"){
        document.querySelector("button[onclick=\"showSection('members')\"]").classList.add("hidden");
    }

}

function showSection(section){

    document.querySelectorAll(".section").forEach(s => s.classList.add("hidden"));

    document.getElementById(section).classList.remove("hidden");

}

function loadData(){

    loadEvents();
    loadMembers();
    loadProfile();
    loadAdmin();

}

function loadEvents(){
    const events = JSON.parse(localStorage.getItem("events"));
    const container = document.getElementById("eventList");
    container.innerHTML="";

    events.forEach((e,i)=>{
        let div = document.createElement("div");
        div.className="card";
        div.innerHTML = e.title;

        if(currentUser.role === "superadmin"){
            let del = document.createElement("button");
            del.innerText="Delete";
            del.onclick=()=>{
                events.splice(i,1);
                localStorage.setItem("events", JSON.stringify(events));
                loadEvents();
            }
            div.appendChild(del);
        }

        container.appendChild(div);
    });
}

function loadMembers(){
    const members = JSON.parse(localStorage.getItem("members"));
    const container = document.getElementById("memberList");
    container.innerHTML="";

    members.forEach((m,i)=>{
        let div = document.createElement("div");
        div.className="card";
        div.innerHTML = m.name;

        if(currentUser.role === "superadmin" || currentUser.role === "admin"){
            let del = document.createElement("button");
            del.innerText="Remove";
            del.onclick=()=>{
                members.splice(i,1);
                localStorage.setItem("members", JSON.stringify(members));
                loadMembers();
            }
            div.appendChild(del);
        }

        container.appendChild(div);
    });
}

function loadAdmin(){

    if(currentUser.role !== "superadmin" && currentUser.role !== "admin"){
        return;
    }

    const container = document.getElementById("adminControls");
    container.innerHTML="";

    if(currentUser.role === "superadmin"){

        container.innerHTML += `
            <h4>Add User</h4>
            <input id="newUser" placeholder="Username">
            <input id="newPass" placeholder="Password">
            <select id="newRole">
                <option value="admin">Admin</option>
                <option value="pastor">Pastor</option>
                <option value="member">Member</option>
            </select>
            <button onclick="addUser()">Add User</button>
        `;

    }

}

function addUser(){
    const username = document.getElementById("newUser").value;
    const password = document.getElementById("newPass").value;
    const role = document.getElementById("newRole").value;

    const users = JSON.parse(localStorage.getItem("users"));
    users.push({username,password,role});
    localStorage.setItem("users", JSON.stringify(users));
    alert("User added");
}

function loadProfile(){
    const container = document.getElementById("profileInfo");
    container.innerHTML = `
        Username: ${currentUser.username}<br>
        Role: ${currentUser.role}
    `;
}

</script>
</body>
</html>
