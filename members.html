<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Members Section</title>
<style>
body{font-family:Arial;background:#002147;color:#fff;padding:40px;}
.btn{background:#FFD700;color:#000;padding:8px 14px;border:none;border-radius:6px;font-weight:bold;margin:4px;cursor:pointer;}
.btn-danger{background:#800000;color:#fff;}
.member-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px;margin-top:20px;}
.member-card{background:#1a1a1a;padding:15px;border-radius:10px;text-align:center;}
.member-card img{width:100%;height:200px;object-fit:cover;border-radius:8px;}
input{width:100%;padding:6px;margin:6px 0;}
</style>
</head>
<body>

<h1>Members Area</h1>

<button class="btn" onclick="login()">Login</button>
<button class="btn" onclick="logout()">Logout</button>

<div id="adminControls" style="display:none;">
<h3>Add / Edit Member</h3>
<input id="mName" placeholder="Name">
<input id="mSurname" placeholder="Surname">
<input id="mNumber" placeholder="Member Number">
<input id="mTitle" placeholder="Title">
<input id="mPhoto" type="file">

<label><input type="checkbox" id="vName" checked> Show Name</label><br>
<label><input type="checkbox" id="vSurname" checked> Show Surname</label><br>
<label><input type="checkbox" id="vNumber" checked> Show Number</label><br>
<label><input type="checkbox" id="vTitle" checked> Show Title</label><br>
<label><input type="checkbox" id="vPhoto" checked> Show Photo</label><br>

<button class="btn" onclick="saveMember()">Save Member</button>
</div>

<div class="member-grid" id="memberGrid"></div>

<script>

function getMembers(){return JSON.parse(localStorage.getItem("members")||"[]")}
function saveMembers(m){localStorage.setItem("members",JSON.stringify(m))}
function getUsers(){return JSON.parse(localStorage.getItem("users")||"{}")}

let currentUser=null;
let editingId=null;

function login(){
let u=prompt("Username");
let p=prompt("Password");
let users=getUsers();
if(users[u] && users[u].password===p && users[u].active){
if(users[u].role==="member"||users[u].role==="admin"||users[u].role==="superadmin"){
currentUser={username:u,role:users[u].role};
if(users[u].role==="admin"||users[u].role==="superadmin"){
adminControls.style.display="block";
}
loadMembers();
}else{
alert("Access Denied");
}
}else alert("Invalid Login");
}

function logout(){location.reload();}

function saveMember(){
let members=getMembers();
let data={
id:editingId||Date.now(),
name:mName.value,
surname:mSurname.value,
number:mNumber.value,
title:mTitle.value,
visibility:{
name:vName.checked,
surname:vSurname.checked,
number:vNumber.checked,
title:vTitle.checked,
photo:vPhoto.checked
}
};

if(mPhoto.files[0]){
let reader=new FileReader();
reader.onload=function(){
data.photo=reader.result;
commit(data);
};
reader.readAsDataURL(mPhoto.files[0]);
}else commit(data);
}

function commit(data){
let members=getMembers();
if(editingId){
members=members.map(m=>m.id===editingId?data:m);
}else members.push(data);

saveMembers(members);
editingId=null;
loadMembers();
}

function editMember(id){
let m=getMembers().find(x=>x.id===id);
editingId=id;
mName.value=m.name;
mSurname.value=m.surname;
mNumber.value=m.number;
mTitle.value=m.title;
vName.checked=m.visibility.name;
vSurname.checked=m.visibility.surname;
vNumber.checked=m.visibility.number;
vTitle.checked=m.visibility.title;
vPhoto.checked=m.visibility.photo;
}

function deleteMember(id){
if(!confirm("Delete member?"))return;
let members=getMembers().filter(m=>m.id!==id);
saveMembers(members);
loadMembers();
}

function loadMembers(){
memberGrid.innerHTML="";
getMembers().forEach(m=>{
let visible=currentUser.role==="admin"||currentUser.role==="superadmin"
?{name:true,surname:true,number:true,title:true,photo:true}
:m.visibility;

let html="";
if(visible.photo && m.photo) html+=`<img src="${m.photo}">`;
if(visible.name||visible.surname)
html+=`<h4>${visible.name?m.name:""} ${visible.surname?m.surname:""}</h4>`;
if(visible.title) html+=`<p>${m.title}</p>`;
if(visible.number) html+=`<small>${m.number}</small>`;

memberGrid.innerHTML+=`
<div class="member-card">
${html||"<p>No visible data</p>"}
${(currentUser.role==="admin"||currentUser.role==="superadmin")?
`<button class="btn" onclick="editMember(${m.id})">Edit</button>
<button class="btn btn-danger" onclick="deleteMember(${m.id})">Delete</button>`:""}
</div>`;
});
}

</script>
</body>
</html>
