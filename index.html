<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Events Calendar</title>

<style>
body{font-family:Arial;margin:0;padding:40px;background:#002147;color:#fff;}
header{text-align:center;margin-bottom:30px;}
.version{font-size:.8em;color:#aaa;font-style:italic;}
h1{color:#FFD700;margin:0;}
h2{color:#FFD700;margin:0;font-size:1em;}
table{width:90%;margin:auto;border-collapse:collapse;background:#1a1a1a;}
th,td{border:1px solid #333;padding:12px;}
th{background:#800000;color:#FFD700;}
tr:nth-child(even){background:#262626;}
.btn{background:#FFD700;color:#000;padding:10px 18px;border-radius:6px;font-weight:bold;cursor:pointer;border:none;margin:5px;}
.btn-danger{background:#800000;color:#fff;}
</style>
</head>

<body>

<header>
<span class="version">Version 2.1PRI</span>
<h1>Message Believer's Network Calendar</h1>
<h2>By The Distributor</h2>
</header>

<div style="text-align:center;">
<button class="btn" onclick="requestEvent()">Request Event</button>
<a href="members.html" class="btn">Members</a>
</div>

<br>

<table id="calendarTable">
<tr>
<th>Date</th>
<th>Event</th>
<th>Details</th>
<th>Host</th>
<th>Admin</th>
</tr>
</table>

<script>

/* STORAGE HELPERS */
function getUsers(){return JSON.parse(localStorage.getItem("users")||"{}");}
function saveUsers(u){localStorage.setItem("users",JSON.stringify(u));}
function getEvents(){return JSON.parse(localStorage.getItem("events")||"[]");}
function saveEvents(e){localStorage.setItem("events",JSON.stringify(e));}

/* FORCE DEFAULT ADMINS */
let users=getUsers();

if(!users.superadmin){
users.superadmin={password:"super123",role:"superadmin",active:true};
}
if(!users.admin2){
users.admin2={password:"admin456",role:"admin",active:true};
}
saveUsers(users);

let currentUser=null;

/* OPTIONAL ADMIN LOGIN */
const loginUser=prompt("Admin login? Leave blank for public");
if(loginUser && users[loginUser]){
const pass=prompt("Password:");
if(pass===users[loginUser].password && users[loginUser].active){
currentUser={name:loginUser,...users[loginUser]};
}
}

/* LOAD EVENTS */
function loadEvents(){
const table=document.getElementById("calendarTable");
table.innerHTML=`
<tr>
<th>Date</th>
<th>Event</th>
<th>Details</th>
<th>Host</th>
<th>Admin</th>
</tr>`;

getEvents().filter(e=>e.status==="approved").forEach(e=>{
table.innerHTML+=`
<tr>
<td>${e.date}</td>
<td>${e.title}</td>
<td>${e.details}</td>
<td>${e.host}</td>
<td>
${currentUser && (currentUser.role==="admin"||currentUser.role==="superadmin")
? `<button class="btn btn-danger" onclick="removeEvent(${e.id})">Remove</button>`
: "-"}
</td>
</tr>`;
});
}

/* REMOVE EVENT */
function removeEvent(id){
if(!confirm("Remove event?")) return;
let events=getEvents().filter(e=>e.id!==id);
saveEvents(events);
loadEvents();
}

/* REQUEST EVENT (PASTOR ONLY) */
function requestEvent(){
const users=getUsers();
const u=prompt("Username:");
if(!users[u] || !users[u].active){alert("Invalid user");return;}
if(users[u].role!=="pastor"){alert("Only Pastors allowed");return;}
const p=prompt("Password:");
if(p!==users[u].password){alert("Incorrect password");return;}

const title=prompt("Event Title:");
const date=prompt("Date:");
const details=prompt("Details:");
const host=prompt("Host Church:");

let events=getEvents();
events.push({
id:Date.now(),
title,date,details,host,
status:"pending"
});
saveEvents(events);
alert("Submitted for approval.");
}

loadEvents();
</script>
</body>
</html>
